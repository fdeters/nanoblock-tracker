name: Monthly Nanoblock Sync

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_NAME: ${{ vars.GOOGLE_SHEET_NAME || 'Sheet1' }}
        run: |
          set -euo pipefail
          if [ -z "$GOOGLE_SHEET_ID" ]; then
            echo "Google Sheets sync failed: GOOGLE_SHEET_ID is not configured" >&2
            exit 1
          fi
          if [ -z "$GOOGLE_CREDENTIALS_JSON" ]; then
            echo "Google Sheets sync failed: GOOGLE_CREDENTIALS_JSON is not configured" >&2
            exit 1
          fi
          python nanoblock_scraper.py --sheet-id "$GOOGLE_SHEET_ID" --credentials "$GOOGLE_CREDENTIALS_JSON" --sheet-name "$GOOGLE_SHEET_NAME" > sync-output.txt

      - name: Send email summary if new rows were added
        if: success()
        env:
          NOTIFICATION_EMAIL: ${{ vars.NOTIFICATION_EMAIL || secrets.NOTIFICATION_EMAIL }}
        run: |
          if [ -s sync-output.txt ]; then
            if grep -q "Appended" sync-output.txt; then
              python scripts/run_monthly_sync.py sync-output.txt "$NOTIFICATION_EMAIL"
            fi
          fi
