name: Monthly Nanoblock Sync

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_NAME: ${{ vars.GOOGLE_SHEET_NAME }}
        run: |
          set -euo pipefail
          if [ -z "$GOOGLE_SHEET_ID" ]; then
            echo "Google Sheets sync failed: GOOGLE_SHEET_ID is not configured" >&2
            exit 1
          fi
          if [ -z "$GOOGLE_CREDENTIALS_JSON" ]; then
            echo "Google Sheets sync failed: GOOGLE_CREDENTIALS_JSON is not configured" >&2
            exit 1
          fi

          GOOGLE_SHEET_NAME="${GOOGLE_SHEET_NAME:-Sheet1}"
          python nanoblock_scraper.py --sheet-id "$GOOGLE_SHEET_ID" --credentials "$GOOGLE_CREDENTIALS_JSON" --sheet-name "$GOOGLE_SHEET_NAME" > sync-output.txt

      - name: Publish sync summary
        if: always()
        run: |
          if [ -s sync-output.txt ]; then
            {
              echo "## Nanoblock sync summary"
              echo
              cat sync-output.txt
            } >> "$GITHUB_STEP_SUMMARY"
          fi
